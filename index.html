<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestor de Tarefas + Lousa</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-theme="light">
  <header class="topbar">
    <h1>Gestor de Tarefas + Lousa</h1>
    <div class="top-actions">
      <button id="theme-toggle" class="btn icon-btn" type="button" aria-label="Alternar tema">
        <svg id="theme-moon" class="theme-svg" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M21 13.1A9 9 0 1 1 10.9 3a7 7 0 0 0 10.1 10.1z" fill="currentColor"></path>
        </svg>
        <svg id="theme-sun" class="theme-svg hidden-icon" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="4" fill="currentColor"></circle>
          <g stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="12" y1="2" x2="12" y2="5"></line>
            <line x1="12" y1="19" x2="12" y2="22"></line>
            <line x1="2" y1="12" x2="5" y2="12"></line>
            <line x1="19" y1="12" x2="22" y2="12"></line>
            <line x1="4.2" y1="4.2" x2="6.4" y2="6.4"></line>
            <line x1="17.6" y1="17.6" x2="19.8" y2="19.8"></line>
            <line x1="17.6" y1="6.4" x2="19.8" y2="4.2"></line>
            <line x1="4.2" y1="19.8" x2="6.4" y2="17.6"></line>
          </g>
        </svg>
      </button>
      <nav class="tabs" role="tablist" aria-label="Seções">
        <button id="tab-tarefas" class="tab active" data-target="tarefas" role="tab" aria-selected="true">Tarefas</button>
        <button id="tab-lousa" class="tab" data-target="lousa" role="tab" aria-selected="false">Lousa Mágica</button>
      </nav>
    </div>
  </header>

  <main>
    <section id="tarefas" class="panel active" role="tabpanel" aria-labelledby="tab-tarefas">
      <div class="card full-page-card">
        <div class="row-head">
          <h2>Visão Geral de Tarefas por Projeto</h2>
          <div class="actions">
            <button id="expand-all" class="btn" type="button">Expandir tudo</button>
            <button id="collapse-all" class="btn" type="button">Recolher tudo</button>
            <button id="open-modal" class="btn primary" type="button">Nova tarefa</button>
            <button id="clear-tasks" class="btn danger" type="button">Limpar tarefas</button>
          </div>
        </div>
        <div id="project-list" class="project-list"></div>
      </div>
    </section>

    <section id="lousa" class="panel" role="tabpanel" aria-labelledby="tab-lousa">
      <div class="card">
        <div class="toolbar">
          <div class="tool-list" id="tool-list" role="toolbar" aria-label="Ferramentas da lousa">
            <button class="tool-btn active" data-tool="select" type="button" title="Selecionar" aria-label="Selecionar">🖱️</button>
            <button class="tool-btn" data-tool="pen" type="button" title="Caneta" aria-label="Caneta">✏️</button>
            <button class="tool-btn" data-tool="rect" type="button" title="Retângulo" aria-label="Retângulo">▭</button>
            <button class="tool-btn" data-tool="ellipse" type="button" title="Elipse" aria-label="Elipse">◯</button>
            <button class="tool-btn" data-tool="arrow" type="button" title="Seta" aria-label="Seta">➜</button>
            <button class="tool-btn" data-tool="text" type="button" title="Texto" aria-label="Texto">T</button>
          </div>

          <label>Cor
            <input type="color" id="stroke-color" value="#1f2937" />
          </label>

          <label>Espessura
            <input type="range" id="stroke-width" min="1" max="12" value="2" />
          </label>

          <button id="undo-btn" class="btn" type="button">Desfazer</button>
          <button id="redo-btn" class="btn" type="button">Refazer</button>
          <button id="export-board" class="btn" type="button">Exportar PNG</button>
          <button id="clear-board" class="btn danger" type="button">Limpar lousa</button>
        </div>

        <div class="canvas-wrap">
          <canvas id="board" width="1200" height="700"></canvas>
        </div>
      </div>
    </section>
  </main>

  <div id="task-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="task-modal-title">
    <div class="modal-content">
      <div class="modal-head">
        <h2 id="task-modal-title">Criar nova tarefa</h2>
        <button id="close-modal" class="btn" type="button">Fechar</button>
      </div>

      <form id="task-form" class="task-form">
        <label>
          Título
          <input type="text" id="titulo" required placeholder="Ex: Planejar sprint" />
        </label>

        <label>
          Projeto
          <input type="text" id="projeto" list="project-options" required placeholder="Ex: App Mobile" />
          <datalist id="project-options"></datalist>
        </label>

        <label>
          Tipo
          <select id="tipo" required>
            <option value="">Selecione</option>
            <option>Bug</option>
            <option>Feature</option>
            <option>Melhoria</option>
            <option>Tarefa Administrativa</option>
          </select>
        </label>

        <label>
          Prioridade
          <select id="prioridade" required>
            <option value="">Selecione</option>
            <option>Baixa</option>
            <option>Média</option>
            <option>Alta</option>
            <option>Crítica</option>
          </select>
        </label>

        <label class="full">
          Descrição
          <textarea id="descricao" rows="4" required placeholder="Detalhes da tarefa..."></textarea>
        </label>

        <label class="full">
          Imagem (opcional)
          <input type="file" id="imagem" accept="image/*" />
        </label>

        <div class="modal-actions full">
          <button id="cancel-modal" class="btn" type="button">Cancelar</button>
          <button id="save-task" type="submit" class="btn primary">Adicionar tarefa</button>
        </div>
      </form>
    </div>
  </div>

  <div id="view-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="view-modal-title">
    <div class="modal-content">
      <div class="modal-head">
        <h2 id="view-modal-title">Visualizar tarefa</h2>
        <button id="close-view-modal" class="btn" type="button">Fechar</button>
      </div>

      <div class="view-grid">
        <p><strong>Título:</strong> <span id="view-titulo"></span></p>
        <p><strong>Projeto:</strong> <span id="view-projeto"></span></p>
        <p><strong>Tipo:</strong> <span id="view-tipo"></span></p>
        <p><strong>Prioridade:</strong> <span id="view-prioridade"></span></p>
        <p><strong>Status:</strong> <span id="view-status"></span></p>
        <p><strong>Criada em:</strong> <span id="view-criada"></span></p>
        <div class="full">
          <strong>Descrição:</strong>
          <p id="view-descricao"></p>
        </div>
        <div class="full" id="view-image-wrap">
          <strong>Imagem:</strong>
          <img id="view-imagem" class="task-image" alt="Imagem da tarefa" />
        </div>
      </div>

      <div class="modal-actions">
        <button id="view-duplicate-btn" class="btn" type="button">Duplicar e criar nova</button>
        <button id="view-delete-btn" class="btn danger" type="button">Excluir tarefa</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
